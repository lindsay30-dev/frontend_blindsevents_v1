<div class="login-page min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <i class="ri-calendar-event-line text-primary" style="font-size: 3rem;"></i>
              <h2 class="mt-3">Connexion</h2>
              <p class="text-muted">Connectez-vous à votre compte BlindEvents</p>
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
              <div class="mb-3">
                <label for="username" class="form-label">
                  <i class="ri-user-line me-2"></i>Nom d'utilisateur
                </label>
                <input
                  type="text"
                  class="form-control"
                  id="username"
                  formControlName="username"
                  placeholder="Entrez votre nom d'utilisateur"
                  [class.is-invalid]="f['username'].invalid && f['username'].touched"
                >
                <div class="invalid-feedback" *ngIf="f['username'].invalid && f['username'].touched">
                  Le nom d'utilisateur est requis
                </div>
              </div>

              <div class="mb-4">
                <label for="password" class="form-label">
                  <i class="ri-lock-line me-2"></i>Mot de passe
                </label>
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  formControlName="password"
                  placeholder="Entrez votre mot de passe"
                  [class.is-invalid]="f['password'].invalid && f['password'].touched"
                >
                <div class="invalid-feedback" *ngIf="f['password'].invalid && f['password'].touched">
                  Le mot de passe doit contenir au moins 6 caractères
                </div>
              </div>

              <button
                type="submit"
                class="btn btn-primary w-100 btn-lg"
                [disabled]="isLoading || loginForm.invalid"
              >
                <span *ngIf="!isLoading">
                  <i class="ri-login-circle-line me-2"></i>Se connecter
                </span>
                <span *ngIf="isLoading">
                  <i class="ri-loader-4-line me-2 spin-icon"></i>Connexion...
                </span>
              </button>
            </form>

            <div class="text-center mt-4">
              <p class="text-muted">
                Vous n'avez pas de compte ?
                <a routerLink="/register" class="text-primary fw-bold">S'inscrire</a>
              </p>
            </div>
          </div>
        </div>

        <div class="text-center mt-3">
          <a routerLink="/" class="text-muted">
            <i class="ri-arrow-left-line me-1"></i>Retour à l'accueil
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
